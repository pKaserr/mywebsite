<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg id="relu_function"
   version="1.1"
   baseProfile="full"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:xlink="http://www.w3.org/1999/xlink"
   width="490"
   height="250">

  <title>ReLU.svg - a plot of the Rectified Linear Unit function</title>

  <desc>
      ReLU-function: f(x) = max(0, x)
      Style adapted from Tanh.svg
  </desc>

  <defs>
    <marker id="Arrow" refX="2.52" refY="2.25" fill="#d3d3d3" markerUnits="strokeWidth"
       markerWidth="6" markerHeight="4.5" orient="auto">
      <path d="M 2.52 2.25 L 0 4.5 L 6 2.25 L 0 0 z" />
    </marker>

    <line id="xgridline" x1="0" x2="0" y1="100.5" y2="-100.5" stroke="#d3d3d3" stroke-width="0.5" />
    <line id="ygridline" x1="-216.5" x2="216.5" y1="0" y2="0" stroke="#d3d3d3" stroke-width="0.5" />
    <line id="xtick" x1="0" x2="0" y1="5" y2="-5" stroke="#d3d3d3" stroke-width="1" />
    <line id="ytick" x1="-5" x2="5" y1="0" y2="0" stroke="#d3d3d3" stroke-width="1" />

    <path id="minus" d="M 83 0 m 578 230 c 14 0 33 0 33 20 c 0 20 -19 20 -33 20 h -467.2 c -14 0 -33 0 -33 -20 c 0 -20 19 -20 33 -20 z"/>
    <path id="one" d="M 89 0 m 205 640 c 0 24 0 26 -23 26 c -62 -64 -150 -64 -182 -64 v -31 c 20 0 79 0 131 26 v -518 c 0 -36 -3 -48 -93 -48 h -32 v -31 c 35 3 122 3 162 3 c 40 0 127 0 162 -3 v 31 h -32 c -90 0 -93 11 -93 48 z"/>
    <path id="two" d="M 50 0 m 399 174 h -25 c -5 -30 -12 -74 -22 -89 c -7 -8 -73 -8 -95 -8 h -180 l 106 103 c 156 138 216 192 216 292 c 0 114 -90 194 -212 194 c -113 0 -187 -92 -187 -181 c 0 -56 50 -56 53 -56 c 17 0 52 12 52 53 c 0 26 -18 52 -53 52 c -8 0 -10 0 -13 -1 c 23 65 77 102 135 102 c 91 0 134 -81 134 -163 c 0 -80 -50 -159 -105 -221 l -192 -214 c -11 -11 -11 -13 -11 -37 h 371 z"/>
  </defs>

  <g transform="translate(244.5, 130)">
    <g id="grid" opacity="0.4">
      <use xlink:href="#xgridline" x="-160" />
      <use xlink:href="#xgridline" x="-80" />
      <use xlink:href="#xgridline" x="80" />
      <use xlink:href="#xgridline" x="160" />
      <use xlink:href="#ygridline" y="80" />
      <use xlink:href="#ygridline" y="-80" />
    </g>

    <g id="axes">
      <line x1="-230.5" x2="230.5" y1="0" y2="0" stroke="#d3d3d3" stroke-width="2" marker-end="url(#Arrow)" />
      <line x1="0" x2="0" y1="113.5" y2="-113.5" stroke="#d3d3d3" stroke-width="2" marker-end="url(#Arrow)" />
    </g>

    <g id="ticks">
      <use xlink:href="#xtick" x="-160" />
      <use xlink:href="#xtick" x="-80" />
      <use xlink:href="#xtick" x="80" />
      <use xlink:href="#xtick" x="160" />
      <use xlink:href="#ytick" y="-80" />
    </g>

    <g id="labels" transform="translate(0,25)">
      <g transform="translate(-160,0) scale(0.02,-0.02)">
        <use xlink:href="#minus" fill="#d3d3d3" x="-950" />
        <use xlink:href="#two" fill="#d3d3d3" x="-250" />
      </g>
      <g transform="translate(-80,0) scale(0.02,-0.02)">
        <use xlink:href="#minus" fill="#d3d3d3" x="-950" />
        <use xlink:href="#one" fill="#d3d3d3" x="-250" />
      </g>
      <g transform="translate(80,0) scale(0.02,-0.02)">
        <use xlink:href="#one" fill="#d3d3d3" x="-250" />
      </g>
      <g transform="translate(160,0) scale(0.02,-0.02)">
        <use xlink:href="#two" fill="#d3d3d3" x="-250" />
      </g>
      <g transform="translate(-15,-105) scale(0.02,-0.02)">
        <use xlink:href="#one" fill="#d3d3d3" />
      </g>
    </g>

    <g transform="scale(80, -80)">
      <path id="relu-path"
          fill="none" stroke="#0f7dbd" stroke-width="0.05px" stroke-linecap="round" stroke-linejoin="round"
          d="M -2, 0 L 0, 0 L 1.4, 1.4" /> 
          </g>
  </g>
</svg>
